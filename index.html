<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ڕێگری کردن لە سکڕۆڵ و جوڵانی شاشە */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* ڕێگری لە سکڕۆڵ */
    position: fixed; /* بۆ ئەوەی لە مۆبایل نەجوڵێت */
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}

/* باکگراوەندە جوڵاوەکە */
body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #0ff, #000, #f0f, #000);
    animation: bgmove 20s linear infinite;
    opacity: 0.2;
    z-index: -1;
}

@keyframes bgmove {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.container {
    width: 90%;
    max-width: 350px;
    text-align: center;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* پڕۆفایل */
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #0ff;
    box-shadow: 0 0 15px #0ff;
    margin: 0 auto;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px #0ff; }
    to { box-shadow: 0 0 25px #0ff, 0 0 40px #0ff; }
}

h1 {
    font-size: 22px;
    margin-top: 10px;
    margin-bottom: 2px;
}

.followers {
    font-size: 13px;
    margin-bottom: 15px;
    opacity: 0.8;
}

/* لینکەکان - قەبارەکەیان بۆ مۆبایل ڕیکخراوە */
.links {
    display: flex;
    flex-direction: column;
    gap: 8px; /* مەودای نێوان دوگمەکان کەمکراوەتەوە */
}

.link {
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    border: 1.5px solid #0ff;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(5px);
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
}

.link:active {
    background: #0ff;
    color: black;
    transform: scale(0.95);
}

/* ئایکۆنی مۆسیقا */
#music-icon {
    position: fixed;
    bottom: 15px;
    left: 15px;
    color: #0ff;
    font-size: 18px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
    <img src="profile.jpg" class="avatar">

    <h1>Khalid Haryad</h1>

    <div class="followers">
        ❤️ 12.4K Followers
    </div>

    <div class="links">
        <a href="tel:07766924732" class="link"><i class="fas fa-phone"></i> Phone</a>
        <a href="viber://add?number=9647766924732" class="link"><i class="fab fa-viber"></i> Viber</a>
        <a href="https://www.tiktok.com/@haryad.14" class="link"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="https://t.me/haryad_00" class="link"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://wa.me/message/KXAPDHCQKMWQC1" class="link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a href="https://www.instagram.com/khalidharyad" class="link"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/share/1HqXb7FjLb/" class="link"><i class="fab fa-facebook"></i> Facebook</a>
    </div>
</div>

<div id="music-icon"><i class="fas fa-music"></i></div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    // لێدانی مۆسیقا بە یەکەم کلیک لە هەرشوێنێکی شاشە
    document.body.addEventListener('click', function() {
        var audio = document.getElementById("bgMusic");
        if (audio.paused) {
            audio.play();
        }
    }, { once: true });

    // ڕێگری تەواو لەوەی شاشەکە بجوڵێت کاتێک دەستی پیا دەهێنیت
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
