<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    color:white;
    overflow:hidden;
}

/* باکگراوەندە جوڵاوەکە */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#0ff,#000,#f0f,#000);
    animation:bgmove 20s linear infinite;
    opacity:0.3;
    z-index: -1;
}

@keyframes bgmove{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

.container{
    position:relative;
    width:400px;
    text-align:center;
    z-index:2;
    padding: 20px;
}

/* پڕۆفایل */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0ff;
    box-shadow:0 0 20px #0ff,0 0 40px #0ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px #0ff}
    to{box-shadow:0 0 30px #0ff,0 0 60px #0ff}
}

h1{
    margin-top:15px;
    margin-bottom:10px;
}

.followers{
    margin-bottom:25px;
    font-size:14px;
    opacity:0.8;
}

/* لینکەکان */
.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link{
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    border:2px solid #0ff;
    box-shadow:0 0 10px #0ff;
    transition:0.3s;
    font-weight:bold;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.link:hover{
    background:#0ff;
    color:black;
    transform:scale(1.05);
    box-shadow:0 0 30px #0ff;
}

.link:active{
    transform:scale(0.9);
}
</style>
</head>

<body>

<div class="container">
    <img src="profile.jpg" class="avatar">

    <h1>Khalid Haryad</h1>

    <div class="followers">
        ❤️ 12.4K Followers
    </div>

    <div class="links">
        <a href="tel:07766924732" class="link"><i class="fas fa-phone"></i> Phone</a>
        <a href="viber://add?number=9647766924732" class="link"><i class="fab fa-viber"></i> Viber</a>
        <a href="https://www.tiktok.com/@haryad.14" class="link"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="https://t.me/haryad_00" class="link"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://wa.me/message/KXAPDHCQKMWQC1" class="link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a href="https://www.instagram.com/khalidharyad" class="link"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/share/1HqXb7FjLb/" class="link"><i class="fab fa-facebook"></i> Facebook</a>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    // ئەم پارچە کۆدە وادەکات بە یەکەم کلیک لەسەر هەر شوێنێکی شاشەکە مۆسیقاکە دەستپێبکات
    // چونکە وێبگەڕەکان ڕێگە نادەن مۆسیقا بەبێ دەست لێدان (Autoplay) لێبدرێت
    window.addEventListener('click', function() {
        var audio = document.getElementById("bgMusic");
        if (audio.paused) {
            audio.play();
        }
    }, { once: true });
</script>
