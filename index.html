<style>
/* ڕێکخستنی سەرەکی بۆ ڕێگەدان بە سکڕۆڵ */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; /* ناوەڕاست کردن */
    background: #000;
    color: white;
    overflow-y: auto; /* ڕێگەدان بە سکڕۆڵی ستوونی */
    padding: 40px 0; /* مەودا بۆ سەرەوە و خوارەوە لە کاتی سکڕۆڵ */
}

/* باکگراوەندە جوڵاوەکە */
body::before{
    content:"";
    position:fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #0ff, #000, #f0f, #000);
    animation: bgmove 20s linear infinite;
    opacity: 0.2;
    z-index: -1;
}

@keyframes bgmove{
    0%{transform: scale(1) rotate(0deg)}
    50%{transform: scale(1.2) rotate(180deg)}
    100%{transform: scale(1) rotate(360deg)}
}

.container{
    position:relative;
    width: 90%;
    max-width: 400px;
    text-align:center;
    z-index: 2;
}

/* پڕۆفایل */
.avatar{
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #0ff;
    box-shadow: 0 0 20px #0ff;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow: 0 0 10px #0ff}
    to{box-shadow: 0 0 30px #0ff, 0 0 50px #0ff}
}

h1{
    margin-top: 20px;
    font-size: 26px;
    letter-spacing: 1px;
}

.followers{
    margin-bottom: 30px;
    font-size: 14px;
    background: rgba(0, 255, 255, 0.1);
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
}

/* لینکەکان */
.links{
    display:flex;
    flex-direction:column;
    gap: 15px;
}

.link{
    padding: 16px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    border: 2px solid #0ff;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.link:hover, .link:active {
    background: #0ff;
    color: black;
    transform: scale(1.03);
    box-shadow: 0 0 25px #0ff;
}

/* نیشانەی مۆسیقا لە خوارەوە */
.music-status {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
    <img src="profile.jpg" class="avatar">

    <h1>Haryad Khalid</h1>

    <div class="followers">
        ❤️ 12.4K Followers
    </div>

    <div class="links">
        <a href="tel:07766924732" class="link"><i class="fas fa-phone"></i> Phone</a>
        <a href="viber://add?number=9647766924732" class="link"><i class="fab fa-viber"></i> Viber</a>
        <a href="https://www.tiktok.com/@haryad.14" class="link"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="https://t.me/haryad_00" class="link"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://wa.me/message/KXAPDHCQKMWQC1" class="link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a href="https://www.instagram.com/khalidharyad" class="link"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/share/1HqXb7FjLb/" class="link"><i class="fab fa-facebook"></i> Facebook</a>
    </div>

    <div class="music-status">
        <i class="fas fa-music"></i> مۆسیقا کار دەکات
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    // لێدانی مۆسیقا بە یەکەم کلیک یان یەکەم دەست لێدان (Touch)
    function playMusic() {
        var audio = document.getElementById("bgMusic");
        if (audio.paused) {
            audio.play();
        }
    }

    document.body.addEventListener('click', playMusic, { once: true });
    document.body.addEventListener('touchstart', playMusic, { once: true });
</script>

</body>
